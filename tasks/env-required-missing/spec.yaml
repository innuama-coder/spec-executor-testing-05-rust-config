version: "2.3"
name: "rust-config-env-required-missing"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-05-rust-config.git"
  branch: "main"
task_dir: "tasks/env-required-missing"
deliverables:
- path: "docs/DELIVERY.md"
  verify: "test -s docs/DELIVERY.md"
execution:
  executor: "codex"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "env-diagnostic-agent"
    role: "验证 ENV 必需但缺失时的 pre-JOB 诊断边界。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items: []
verification:
  commands:
  - "test -s docs/DELIVERY.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: true
