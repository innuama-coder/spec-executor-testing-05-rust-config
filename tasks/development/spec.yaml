version: "2.3"
name: "rust-config-parser"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-05-rust-config.git"
  branch: "main"
task_dir: "tasks/development"
deliverables:
- path: "src/lib.rs"
  verify: "cargo test"
- path: "docs/DELIVERY.md"
  verify: "test -s docs/DELIVERY.md && grep -q \"^执行结果：通过$\" docs/DELIVERY.md"
execution:
  executor: "claude"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "rust-config-agent"
    role: "实现 Rust 配置解析库，保持测试和交付说明一致。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items:
    - id: "REV-CONFIG-001"
      source: "external-review"
      severity: "should"
      target: "docs/DELIVERY.md"
      issue: "交付说明需要解释配置解析的边界条件。"
      expected_fix: "补充空值、重复 key 或非法行的处理说明。"
      acceptance: "grep -q \"执行结果：通过\" docs/DELIVERY.md"
verification:
  commands:
  - "cargo test"
  - "test -s docs/DELIVERY.md && grep -q \"^执行结果：通过$\" docs/DELIVERY.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: false
